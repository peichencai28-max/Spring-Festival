<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新年進階教室 - B1 語音強化版</title>
    <style>
        :root {
            --soft-red: #d63031;
            --gold: #f1c40f;
            --warm-cream: #fff9f0;
            --text-dark: #2d3436;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--warm-cream);
            margin: 0; display: flex; flex-direction: column; align-items: center;
        }

        nav { display: flex; gap: 10px; margin: 20px; flex-wrap: wrap; justify-content: center; }
        nav button {
            padding: 12px 20px; border-radius: 25px; border: 2px solid var(--soft-red);
            background: white; color: var(--soft-red); font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        nav button.active { background: var(--soft-red); color: white; }

        .container {
            width: 90%; max-width: 600px; background: white; padding: 25px;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; text-align: center; border: 3px solid #ffeaa7; min-height: 400px;
        }
        .container.show { display: block; }

        /* 遊戲與畫布樣式 */
        #game-stage {
            width: 100%; height: 350px; background: #fffcf0; border-radius: 15px;
            position: relative; overflow: hidden; border: 2px dashed var(--soft-red);
        }
        #player { position: absolute; bottom: 10px; font-size: 50px; left: 125px; user-select: none; z-index: 10; }
        .item { position: absolute; font-size: 35px; user-select: none; }
        
        .canvas-wrapper { position: relative; width: 300px; height: 300px; margin: 0 auto; background: #fff; border: 2px solid #eee; }
        #word-guide { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            justify-content: center; align-items: center; font-size: 200px; 
            color: rgba(214, 48, 49, 0.1); pointer-events: none; 
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; }

        #feedback-text { font-size: 1.5rem; font-weight: bold; color: var(--soft-red); margin-top: 15px; height: 40px; }
        .quiz-option { 
            background: #fff5f5; border: 2px solid #ffdfe0; padding: 12px; 
            margin: 8px 0; border-radius: 15px; cursor: pointer; display: block; width: 100%;
        }
    </style>
</head>
<body>

<h1 style="color: var(--soft-red); margin-top: 20px;">🧧 新年文化進階教室 (B1)</h1>

<nav>
    <button id="nav-intro" class="active" onclick="showPage('intro')">🌸 新年俗諺</button>
    <button id="nav-quiz" onclick="showPage('quiz')">💡 知識挑戰</button>
    <button id="nav-writing" onclick="showPage('writing')">🖌️ 描紅練習</button>
    <button id="nav-game" onclick="showPage('game')">💰 搶好彩頭</button>
</nav>

<div id="intro" class="container show">
    <h2>🏮 吉祥話語音導覽</h2>
    <p>點擊下方卡片聽聽看怎麼唸：</p>
    <div style="cursor:pointer; background:#fff5f5; padding:15px; border-radius:10px; margin-bottom:10px;" onclick="speak('年年有餘')"><b>🐟 年年有餘：</b>每年財富都有剩餘。</div>
    <div style="cursor:pointer; background:#fff5f5; padding:15px; border-radius:10px; margin-bottom:10px;" onclick="speak('好彩頭')"><b>🥕 好彩頭：</b>象徵好運的開始。</div>
    <div style="cursor:pointer; background:#fff5f5; padding:15px; border-radius:10px; margin-bottom:10px;" onclick="speak('步步高升')"><b>🎍 步步高升：</b>祝福地位不斷提高。</div>
</div>

<div id="quiz" class="container">
    <div id="quiz-content">
        <h3 id="q-text">加載中...</h3>
        <div id="q-options"></div>
        <p id="q-count" style="color:#999"></p>
    </div>
    <div id="quiz-finished" style="display:none;">
        <h2 style="color:var(--soft-red)">🏆 恭喜你！</h2>
        <p style="font-size:1.2rem">你已完成了所有 5 題知識挑戰！</p>
        <button onclick="resetQuiz()" style="padding:10px 20px; border-radius:10px;">重新開始</button>
    </div>
</div>

<div id="writing" class="container">
    <h3>🖋️ 漢字描紅與讀音</h3>
    <div style="margin-bottom: 10px;">
        <button onclick="changeWord('春')">春</button>
        <button onclick="changeWord('福')">福</button>
        <button onclick="changeWord('吉')">吉</button>
    </div>
    <div class="canvas-wrapper">
        <div id="word-guide">春</div>
        <canvas id="paintCanvas" width="300" height="300"></canvas>
    </div>
    <button onclick="speakWord()" style="margin-top:15px; background:var(--gold); border:none; padding:10px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">聽聽看這個字 🔊</button>
    <button onclick="clearCanvas()" style="margin-top:15px; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">重新練習</button>
</div>

<div id="game" class="container">
    <div style="font-size: 1.1rem; margin-bottom: 10px;">
        ⏱ 時間：<span id="timer" style="color:red">30</span>s | 🏆 分數：<span id="score">0</span>
    </div>
    <div id="game-stage">
        <div id="player">🧺</div>
    </div>
    <div id="feedback-text">準備好了嗎？</div>
    <button id="start-btn" onclick="startGame()" style="padding:10px 30px; background:#55efc4; border:none; border-radius:20px; font-weight:bold; cursor:pointer;">開始挑戰</button>
</div>

<script>
    // --- 語音功能 (TTS) ---
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
    }

    function showPage(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('show'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('show');
        document.getElementById('nav-'+id).classList.add('active');
        if(id === 'writing') initCanvas();
        if(id === 'game') resetGame();
    }

    // --- 知識挑戰功能 ---
    const questions = [
        { q: "「年年有餘」的「餘」跟哪種食物諧音？", a: ["魚", "肉", "菜"], c: 0 },
        { q: "過年吃什麼代表「步步高升」？", a: ["年糕", "魚", "水餃"], c: 0 },
        { q: "「好彩頭」是指哪一種蔬菜？", a: ["高麗菜", "白蘿蔔", "紅蘿蔔"], c: 1 },
        { q: "為什麼要放鞭炮？", a: ["為了嚇跑年獸", "為了照明", "為了熱鬧"], c: 0 },
        { q: "除夕夜吃的晚餐叫什麼？", a: ["早餐", "團圓飯", "下午茶"], c: 1 }
    ];
    let qIdx = 0;
    function startQuiz() {
        if(qIdx >= questions.length) {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('quiz-finished').style.display = 'block';
            return;
        }
        const q = questions[qIdx];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('q-count').innerText = `進度：${qIdx+1} / 5`;
        const box = document.getElementById('q-options'); box.innerHTML = '';
        q.a.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'quiz-option'; b.innerText = t;
            b.onclick = () => { if(i === q.c) { qIdx++; speak("答對了"); startQuiz(); } };
            box.appendChild(b);
        });
    }
    function resetQuiz() { 
        qIdx = 0; 
        document.getElementById('quiz-content').style.display = 'block';
        document.getElementById('quiz-finished').style.display = 'none';
        startQuiz(); 
    }
    startQuiz();

    // --- 描紅練習功能 ---
    let ctx, drawing = false;
    function initCanvas() {
        const cvs = document.getElementById('paintCanvas'); ctx = cvs.getContext('2d');
        ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.strokeStyle = '#f1c40f';
        cvs.onmousedown = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
        cvs.onmousemove = (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
        window.onmouseup = () => drawing = false;
        // 觸控支援
        cvs.ontouchstart = (e) => { e.preventDefault(); drawing=true; const r = cvs.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); };
        cvs.ontouchmove = (e) => { e.preventDefault(); if(drawing) { const r = cvs.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); ctx.stroke(); } };
    }
    function changeWord(w) { 
        document.getElementById('word-guide').innerText = w; 
        clearCanvas(); 
        speak(w); 
    }
    function speakWord() { speak(document.getElementById('word-guide').innerText); }
    function clearCanvas() { ctx.clearRect(0,0,300,300); }

    // --- 搶好彩頭功能 (漢字語音版) ---
    let score = 0, timeLeft = 30, gameActive = false;
    let mainLoop, spawnLoop, timerLoop;
    const stage = document.getElementById('game-stage');
    const player = document.getElementById('player');
    const feedback = document.getElementById('feedback-text');
    let items = [];

    function resetGame() {
        gameActive = false; clearInterval(mainLoop); clearInterval(spawnLoop); clearInterval(timerLoop);
        items.forEach(i => i.remove()); items = [];
        document.getElementById('start-btn').style.display = 'inline-block';
    }

    function startGame() {
        resetGame(); gameActive = true; score = 0; timeLeft = 30;
        document.getElementById('score').innerText = "0";
        document.getElementById('start-btn').style.display = 'none';
        feedback.innerText = "開始接新年好物吧！";
        
        stage.onmousemove = (e) => {
            const rect = stage.getBoundingClientRect();
            let x = e.clientX - rect.left - 25;
            x = Math.max(0, Math.min(x, stage.offsetWidth - 50));
            player.style.left = x + 'px';
        };

        timerLoop = setInterval(() => {
            timeLeft--; document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { alert("挑戰結束！得分：" + score); resetGame(); }
        }, 1000);

        mainLoop = setInterval(updateItems, 30);
        spawnLoop = setInterval(spawnItem, 700);
    }

    function spawnItem() {
        const types = [
            { t: '🧧', n: '紅包', g: '大吉大利', v: 1 },
            { t: '🥕', n: '菜頭', g: '好彩頭', v: 2 },
            { t: '💰', n: '元寶', g: '恭喜發財', v: 5 },
            { t: '🍍', n: '鳳梨', g: '旺來', v: 2 },
            { t: '🧨', n: '鞭炮', g: '歲歲平安', v: -5 }
        ];
        const type = types[Math.floor(Math.random()*types.length)];
        const el = document.createElement('div');
        el.className = 'item'; el.innerText = type.t;
        el.dataset.name = type.n; el.dataset.greet = type.g; el.dataset.val = type.v;
        el.style.left = Math.random() * (stage.offsetWidth - 40) + 'px';
        el.style.top = '-50px';
        stage.appendChild(el);
        items.push(el);
    }

    function updateItems() {
        items.forEach((el, i) => {
            let top = parseInt(el.style.top) + 4;
            el.style.top = top + 'px';
            const pRect = player.getBoundingClientRect();
            const iRect = el.getBoundingClientRect();
            if(iRect.bottom >= pRect.top && iRect.left < pRect.right && iRect.right > pRect.left) {
                const val = parseInt(el.dataset.val);
                score += val; document.getElementById('score').innerText = score;
                const txt = `${el.dataset.name} - ${el.dataset.greet}`;
                feedback.innerText = txt;
                speak(txt);
                el.remove(); items.splice(i, 1);
            } else if(top > 350) { el.remove(); items.splice(i, 1); }
        });
    }
</script>
</body>
</html>
